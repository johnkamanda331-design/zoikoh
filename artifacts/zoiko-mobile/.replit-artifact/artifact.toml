kind = "mobile"
previewPath = "/mobile/"
title = "ZOIKO Mobile"
version = "1.0.0"
id = "artifacts/zoiko-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 23415

[services.development]
run = "pnpm --filter @workspace/zoiko-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zoiko-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/zoiko-mobile", "run", "serve" ]

[services.env]
PORT = "23415"
BASE_PATH = "/mobile/"
